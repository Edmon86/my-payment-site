<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>PRO Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #0f172a;
      color: white;
      padding: 25px;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 14px;
    }

    .table {
      color: white;
    }

    .table thead {
      color: #94a3b8;
    }

    .stat {
      background: #111827;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #1f2937;
      text-align: center;
    }

    .stat h3 {
      margin: 0;
      font-size: 22px;
    }

    .badge-paid {
      background: #22c55e;
    }

    .badge-wait {
      background: #f59e0b;
    }

    input, select {
      background: #111827 !important;
      color: white !important;
      border: 1px solid #1f2937 !important;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border-radius: 10px !important;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="top-bar">
    <h2>📊 PRO Admin Panel</h2>
    <button class="btn btn-primary" onclick="loadOrders()">🔄 Обновить</button>
  </div>

  <!-- ФИЛЬТРЫ -->
  <div class="filters mb-3">
    <input id="search" class="form-control" placeholder="🔍 Поиск по email" oninput="render()">
    <input id="dateFilter" type="date" class="form-control" onchange="render()">
    <button class="btn btn-secondary" onclick="clearFilters()">Очистить</button>
  </div>

  <!-- СТАТИСТИКА -->
  <div class="row mb-3">
    <div class="col-md-4">
      <div class="stat">
        <p>Заказы</p>
        <h3 id="totalOrders">0</h3>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat">
        <p>Выручка</p>
        <h3 id="totalAmount">0 ₽</h3>
      </div>
    </div>
  </div>

  <!-- ТАБЛИЦА -->
  <div class="card p-3">
    <table class="table table-hover">
      <thead>
        <tr>
          <th>#</th>
          <th>Email</th>
          <th>Сумма</th>
          <th>Услуги</th>
          <th>Дата</th>
          <th>Статус</th>
        </tr>
      </thead>
      <tbody id="ordersTable"></tbody>
    </table>
  </div>

</div>

<script>
let orders = [];

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

async function loadOrders() {
  const res = await fetch("/admin");
  orders = await res.json();
  render();
}

function render() {
  const table = document.getElementById("ordersTable");
  table.innerHTML = "";

  let search = document.getElementById("search").value.toLowerCase();
  let dateFilter = document.getElementById("dateFilter").value;

  let filtered = orders.filter(o => {
    let email = String(o.email ?? "");
    let created = String(o.created ?? "");
    let okEmail = email.toLowerCase().includes(search);
    let okDate = true;

    if (dateFilter) {
      okDate = created.startsWith(dateFilter);
    }

    return okEmail && okDate;
  });

  let total = 0;

  filtered.reverse().forEach((o, i) => {
    total += Number(o.amount) || 0;

    const status = o.status === "paid"
      ? `<span class="badge badge-paid">paid</span>`
      : `<span class="badge badge-wait">pending</span>`;

    const services = Array.isArray(o.services)
      ? o.services.map(s => `${escapeHtml(s.name)} (${escapeHtml(s.price)}₽)`).join("<br>")
      : "";

    table.innerHTML += `
      <tr>
        <td>${i + 1}</td>
        <td>${escapeHtml(o.email || "—")}</td>
        <td><b>${escapeHtml(o.amount || 0)} ₽</b></td>
        <td>${services}</td>
        <td>${escapeHtml(o.created ? new Date(o.created).toLocaleString() : "—")}</td>
        <td>${status}</td>
      </tr>
    `;
  });

  document.getElementById("totalOrders").innerText = filtered.length;
  document.getElementById("totalAmount").innerText = total + " ₽";
}

function clearFilters() {
  document.getElementById("search").value = "";
  document.getElementById("dateFilter").value = "";
  render();
}

setInterval(loadOrders, 5000);
loadOrders();
</script>

</body>
</html>
