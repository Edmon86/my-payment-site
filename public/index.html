<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Оплата услуг</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Stripe -->
  <script src="https://js.stripe.com/v3/"></script>

  <style>
    body {
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .btn-primary {
      border-radius: 10px;
      font-size: 18px;
    }

    .total-box {
      font-size: 22px;
      font-weight: bold;
    }

    .form-check {
      cursor: pointer;
    }

    .input-error {
      border: 2px solid #dc3545 !important;
    }

    .input-success {
      border: 2px solid #28a745 !important;
    }

    #emailError {
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #emailError.show {
      display: block !important;
      opacity: 1;
    }

    .form-check-input:checked + .form-check-label {
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card p-4">
        <h2 class="text-center mb-4">Выберите услуги</h2>

        <!-- EMAIL -->
        <div class="mb-3">
          <input 
            type="email"
            class="form-control"
            id="customerEmail"
            placeholder="Введите ваш email"
            required
          >
          <div id="emailError" class="text-danger mt-1"></div>
        </div>

        <!-- УСЛУГИ -->
        <div class="form-check mb-3">
          <input class="form-check-input service" 
                 type="checkbox" 
                 data-id="site" 
                 data-price="1500"
                 id="service1">
          <label class="form-check-label" for="service1">
            Разработка сайта — 1500 ₽
          </label>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input service" 
                 type="checkbox" 
                 data-id="ads" 
                 data-price="800"
                 id="service2">
          <label class="form-check-label" for="service2">
            Настройка рекламы — 800 ₽
          </label>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input service" 
                 type="checkbox" 
                 data-id="logo" 
                 data-price="500"
                 id="service3">
          <label class="form-check-label" for="service3">
            Дизайн логотипа — 500 ₽
          </label>
        </div>

        <hr>

        <!-- ИТОГО -->
        <div class="text-center total-box mb-3">
          Итого: <span id="total">0</span> ₽
        </div>

        <!-- КНОПКА -->
        <button id="checkout-button" class="btn btn-primary w-100" disabled>
          Перейти к оплате
        </button>

      </div>

    </div>
  </div>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
